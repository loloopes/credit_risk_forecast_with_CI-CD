services:

  postgres:
    image: postgres:15
    container_name: mlflow_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: mlflow_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      # Host port defaults to 19000 — localhost:9000 is often ClickHouse native or other non-HTTP tools (BadStatusLine).
      # Override: MINIO_API_HOST_PORT=9000 docker compose up
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - ./minio_data:/data
    networks:
      default:
      minio_shared:
        # So other stacks on minio_minio (e.g. Trino) can resolve hostname "minio"
        aliases:
          - minio

  create_bucket:
    image: minio/mc
    restart: "no"
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/${MLFLOW_BUCKET};
      mc policy set public myminio/${MLFLOW_BUCKET};
      exit 0;
      "

  mlflow:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile
    container_name: mlflow_server
    working_dir: /mlflow_data
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
      create_bucket:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}
      # Required for --app-name basic-auth (CSRF / session signing). Override in .env for production.
      MLFLOW_FLASK_SERVER_SECRET_KEY: ${MLFLOW_FLASK_SERVER_SECRET_KEY:-change-me-set-a-long-random-secret-in-env}
      # Same credentials the MLflow client uses (browser UI login + API basic auth).
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME:-admin}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD:-password1234}
    volumes:
      # Persists basic_auth.db (users/permissions) across container recreates.
      - mlflow_auth_data:/mlflow_data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import base64, os, urllib.request as rq; u=os.environ['MLFLOW_TRACKING_USERNAME']; p=os.environ['MLFLOW_TRACKING_PASSWORD']; t=base64.b64encode(f'{u}:{p}'.encode()).decode(); r=rq.Request('http://127.0.0.1:5000/', headers={'Authorization': f'Basic {t}'}); rq.urlopen(r, timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    command: >
      bash -c "
      mlflow db upgrade postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB} &&
      exec mlflow server
      --app-name basic-auth
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '${MLFLOW_SERVER_ALLOWED_HOSTS}'
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB}
      --default-artifact-root s3://${MLFLOW_BUCKET}
      "

  credit_api:
    build:
      context: ./prod
      dockerfile: dockerfile
    container_name: credit_scoring_api
    hostname: credit-scoring-api
    depends_on:
      mlflow:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      # Importante: Usamos os nomes dos serviços do Docker Compose como hosts
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME:-admin}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD:-password1234}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}
      MODEL_LOAD_BLOCKING: ${MODEL_LOAD_BLOCKING:-false}
      MODEL_LOAD_TIMEOUT_SECONDS: ${MODEL_LOAD_TIMEOUT_SECONDS:-300}
      # Usa versão registrada existente no MLflow
      MLFLOW_MODEL_URI: ${MLFLOW_MODEL_URI}
      RUN_ID: ${RUN_ID}
      MLFLOW_MODEL_ARTIFACT_PATH: ${MLFLOW_MODEL_ARTIFACT_PATH}
      MLFLOW_MODEL_NAME: ${MLFLOW_MODEL_NAME}
      MLFLOW_MODEL_STAGE: ${MLFLOW_MODEL_STAGE}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_IGNORE_TLS: ${MLFLOW_S3_IGNORE_TLS}
      SPARK_MASTER_URL: ${SPARK_MASTER_URL:-spark://spark-master:7077}
      SPARK_HIVE_METASTORE_URIS: ${SPARK_HIVE_METASTORE_URIS:-thrift://hive-metastore:9083}
      SPARK_SQL_WAREHOUSE_DIR: ${SPARK_SQL_WAREHOUSE_DIR:-s3a://lakehouse/}
      SPARK_DRIVER_HOST: ${SPARK_DRIVER_HOST:-credit-scoring-api}
      SPARK_S3A_ENDPOINT: ${SPARK_S3A_ENDPOINT:-http://minio:9000}
      PYSPARK_DRIVER_PYTHON: ${PYSPARK_DRIVER_PYTHON:-python3}
      PYSPARK_PYTHON: ${PYSPARK_PYTHON:-python3}
      PREDICTION_LOG_DATABASE: ${PREDICTION_LOG_DATABASE:-forecast}
      PREDICTION_LOG_TABLE: ${PREDICTION_LOG_TABLE:-prediction_events}
      PREDICTION_LOG_REQUESTS_TABLE: ${PREDICTION_LOG_REQUESTS_TABLE:-prediction_requests}
      PREDICTION_LOG_ENABLED: ${PREDICTION_LOG_ENABLED:-true}
      PREDICTION_LOG_STRICT: ${PREDICTION_LOG_STRICT:-true}
      KAFKA_CONSUMER_ENABLED: ${KAFKA_CONSUMER_ENABLED:-true}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-credit-risk-forecast-consumer}
      KAFKA_CONSUMER_TOPIC: ${KAFKA_CONSUMER_TOPIC:-predict}
      KAFKA_CONSUMER_SYNC_LAKEHOUSE_WRITE: ${KAFKA_CONSUMER_SYNC_LAKEHOUSE_WRITE:-true}
      KAFKA_CONSUMER_MAX_POLL_RECORDS: ${KAFKA_CONSUMER_MAX_POLL_RECORDS:-64}
      KAFKA_CONSUMER_BATCH_MAX_WAIT_MS: ${KAFKA_CONSUMER_BATCH_MAX_WAIT_MS:-200}
      LAKEHOUSE_WRITE_REPARTITION: ${LAKEHOUSE_WRITE_REPARTITION:-2}
    networks:
      - default
      - minio_shared
      - credit_risk_shared
  
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_KRAFT_MODE: 'true'
      CLUSTER_ID: '1L6g7nGhU-eAKfL--X25wo'
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LOG_DIR: /tmp/kafka-combined-logs

    networks:
      - default
      - minio_shared
      - credit_risk_shared  
    volumes:
      - ./kafka_data:/tmp/kafka-combined-logs

networks:
  minio_shared:
    external: true
    name: minio_minio
  credit_risk_shared:
    external: true
    name: credit_risk_shared

volumes:
  postgres_data:
  mlflow_auth_data: